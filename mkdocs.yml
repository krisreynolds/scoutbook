site_name: Scoutbook
site_description: A curated list of tools, programme ideas, and campsites for Scouts
site_url: https://krisreynolds.github.io/scoutbook

theme:
  name: material
  palette:
    scheme: slate
    primary: green
    accent: light green
  features:
    - navigation.sections
    - navigation.top
    - search.highlight

markdown_extensions:
  - toc:
      permalink: true

nav:
  - Home: index.md
  - Campsites: campsites.md
  - Programme Ideas: programme-ideas.md
  - Tools & Apps: tools.md
  - Useful Links: links.md
