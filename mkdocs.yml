site_name: Scoutbook
site_description: A curated list of tools, programme ideas, and campsites for Scouts
site_url: https://krisreynolds.github.io/scoutbook

theme:
  name: material
  font:
    text: Nunito Sans        # body text
    code: DM Mono       # code blocks
  palette:
    - scheme: default
      primary: deep purple
      accent: purple
      toggle:
        icon: material/brightness-7
        name: Switch to dark mode
    - scheme: slate
      primary: deep purple
      accent: purple
      toggle:
        icon: material/brightness-4
        name: Switch to light mode
  features:
    - navigation.sections
    - navigation.top
    - search.highlight

markdown_extensions:
  - toc:
      permalink: true

nav:
  - Home: index.md
  - Campsites: campsites.md
  - Programme Ideas: programme-ideas.md
  - Tools & Apps: tools.md
  - Useful Links: links.md
