site_name: Scoutbook
site_description: A curated list of tools, programme ideas, and campsites for Scouts
site_url: https://krisreynolds.github.io/scoutbook

theme:
  name: material
  font:
    text: Nunito Sans        # body text
    code: DM Mono       # code blocks
  palette:
    - scheme: default
      primary: deep purple
      accent: teal
      toggle:
        icon: material/brightness-7
        name: Switch to dark mode
    - scheme: slate
      primary: deep purple
      accent: teal
        toggle:
        icon: material/brightness-4
        name: Switch to light mode
  features:
    - navigation.sections
    - navigation.top
    - search.highlight

markdown_extensions:
  - toc:
      permalink: true
  - attr_list  # For manual {target="_blank"} if needed

plugins:
  - search
  - open-in-new-tab:
      add_icon: true  # Adds ↗ icon to external/PDF links

nav:
  - Home: index.md
  - Scout Association Links: scouts-links.md
  - Campsites: campsites.md
  - Programme Ideas: programme-ideas.md
  - Tools & Apps: tools.md
  - Useful Links: links.md

extra_css:
  - overrides/extra.css
