site_name: Scoutbook
site_description: A curated list of tools, programme ideas, and campsites for Scouts
site_url: https://krisreynolds.github.io/scoutbook

theme:
  name: material
  custom_dir: overrides
  font:
    text: Nunito Sans
    code: DM Mono
  palette:
    - scheme: default
      primary: deep purple
      accent: teal
      toggle:
        icon: material/brightness-7
        name: Switch to dark mode
    - scheme: slate
      primary: deep purple
      accent: teal
      toggle:
        icon: material/brightness-4
        name: Switch to light mode
  features:
    - navigation.sections
    - navigation.top
    - search.highlight

markdown_extensions:
  - toc:
      permalink: true
      toc_depth: 2
  - attr_list

plugins:
  - search
  - open-in-new-tab:
      add_icon: true

nav:
  - Home: index.md
  - Scout Association Links: scouts-links.md
  - Campsites: campsites.md
  - Programme Ideas: programme-ideas.md
  - External Activity Providers: external-providers.md
  - Shops & Suppliers: shops-suppliers.md
  - Tools & Apps: tools.md
  - Useful Links: links.md
  - Scout Discounts: discounts.md

extra_css:
  - extra.css
