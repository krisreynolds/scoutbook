{% extends "base.html" %}

{% block site_nav %}
  {{ super() }}
  <div id="md-nav-extra" style="display:none; flex-direction:column; gap:0.5rem; padding:0.75rem 1rem;">
    <a href="https://form.jotform.com/260734372907057" class="md-nav-btn md-nav-btn--green">
      ➕ Suggest a link
    </a>
    <a href="https://ko-fi.com/Q5Q61W68K8" target="_blank" rel="noopener" class="md-nav-btn md-nav-btn--yellow">
      🍺 Buy me a beer
    </a>
  </div>
  <script>
    document.addEventListener("DOMContentLoaded", function() {
      var extra = document.getElementById("md-nav-extra");
      var sidebar = document.querySelector(".md-sidebar--primary .md-sidebar__inner");
      if (extra && sidebar) {
        extra.style.display = "flex";
        sidebar.appendChild(extra);
      }
    });
  </script>

  <script>
  kofiWidgetOverlay.draw('krisreynoldsdev', {
    'type': 'floating-chat',
    'floating-chat.donateButton.text': 'Buy me a beer!',
    'floating-chat.donateButton.background-color': '#00b9fe',
    'floating-chat.donateButton.text-color': '#fff'
  });
</script>
  
{% endblock %}
